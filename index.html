<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Quest: Spell & Solve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fef2f2 0%, #f0f9ff 100%);
            min-height: 100vh;
        }

        .font-game { font-family: 'Fredoka One', cursive; }

        .letter-slot {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .blank-input {
            width: 2rem;
            height: 2.8rem;
            border-bottom: 3px solid #cbd5e1;
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
            color: #1e40af;
            background: #f8fafc;
            outline: none;
            border-radius: 4px 4px 0 0;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .blank-input:focus {
            border-bottom-color: #3b82f6;
            background: #eff6ff;
        }

        .blank-input.correct {
            border-bottom-color: #22c55e;
            color: #16a34a;
            background: #f0fdf4;
        }
        
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="game-container" class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-3xl font-game mb-1 tracking-wider">Festival Quest</h1>
            <div class="flex justify-center items-center gap-2 text-xs font-bold opacity-80 uppercase tracking-tighter">
                <span>Spell Festival</span>
                <span>→</span>
                <span>Fill Activities</span>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-100 h-3">
            <div id="progress" class="bg-emerald-400 h-3 transition-all duration-1000" style="width: 0%"></div>
        </div>

        <!-- Start Screen -->
        <div id="screen-start" class="p-12 text-center">
            <div class="text-7xl mb-8 animate-bounce">🏮🐲🥚🎄🎃</div>
            <h2 class="text-2xl font-bold mb-4 text-slate-800 font-game">Can you master all the festivals?</h2>
            <p class="text-slate-500 mb-8 max-w-md mx-auto">Spell the names of the holidays and complete the words for their famous traditions!</p>
            <button onclick="startGame()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-game text-xl py-4 px-12 rounded-full shadow-lg transform transition active:scale-95">
                START PLAYING
            </button>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="hidden p-4 md:p-8">
            
            <!-- PHASE 1: Spell Festival -->
            <div id="phase-spell-festival" class="text-center fade-in">
                <div class="mb-6">
                    <span class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Part 1: The Holiday</span>
                </div>
                <div id="festival-icon" class="text-7xl mb-6"></div>
                <div id="fest-letter-slots" class="flex flex-wrap justify-center gap-2 mb-10"></div>
                <div id="fest-keyboard" class="flex flex-wrap justify-center gap-2 max-w-lg mx-auto bg-slate-50 p-4 rounded-2xl border border-slate-100"></div>
            </div>

            <!-- PHASE 2: Activity Blanks -->
            <div id="phase-activity-blanks" class="hidden fade-in">
                <div class="text-center mb-8">
                    <span class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Part 2: Traditions</span>
                    <h2 id="match-title" class="text-2xl font-bold mt-4 text-slate-700 font-game"></h2>
                </div>

                <div id="activity-container" class="space-y-4 max-w-2xl mx-auto">
                    <!-- Activity spelling rows -->
                </div>

                <div class="mt-10 text-center">
                    <button id="btn-next-festival" onclick="finishActivityPhase()" class="hidden bg-emerald-500 hover:bg-emerald-600 text-white font-game py-4 px-12 rounded-full shadow-xl transition transform hover:scale-105 active:scale-95">
                        CONTINUE ADVENTURE →
                    </button>
                </div>
            </div>
        </div>

        <!-- End Screen -->
        <div id="screen-end" class="hidden p-16 text-center fade-in">
            <div class="text-8xl mb-6">👑</div>
            <h2 class="text-4xl font-game text-indigo-600 mb-4">Festival Master!</h2>
            <p class="text-slate-600 text-xl mb-10">You've mastered all the spellings and activities.</p>
            <button onclick="location.reload()" class="bg-indigo-600 text-white font-game py-4 px-12 rounded-full shadow-lg">PLAY AGAIN</button>
        </div>
    </div>

    <!-- UI Feedback -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-bold shadow-2xl hidden z-50 transition-all text-lg"></div>

    <script>
        const festivalData = [
            { 
                name: "MID AUTUMN FESTIVAL", 
                icon: "🏮", 
                activities: ["GAZE AT THE FULL MOON", "SOLVE RIDDLES"] 
            },
            { 
                name: "DRAGON BOAT FESTIVAL", 
                icon: "🐲", 
                activities: ["WATCH DRAGON BOAT RACES", "EAT RICE DUMPLINGS"] 
            },
            { 
                name: "EASTER", 
                icon: "🥚", 
                activities: ["HUNT FOR CHOCOLATE EGGS"] 
            },
            { 
                name: "CHRISTMAS", 
                icon: "🎄", 
                activities: ["PUT ON THE CHRISTMAS TREE", "EXCHANGE CHRISTMAS GIFT"] 
            },
            { 
                name: "HALLOWEEN", 
                icon: "🎃", 
                activities: ["GO TRICK OR TREATING", "WEAR COSTUMES"] 
            }
        ];

        let currentFestIdx = 0;
        let festSpellingIndex = 0;

        function startGame() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            loadFestivalSpelling();
        }

        function loadFestivalSpelling() {
            const fest = festivalData[currentFestIdx];
            festSpellingIndex = 0;
            
            document.getElementById('phase-spell-festival').classList.remove('hidden');
            document.getElementById('phase-activity-blanks').classList.add('hidden');
            document.getElementById('festival-icon').innerText = fest.icon;
            
            const slotContainer = document.getElementById('fest-letter-slots');
            slotContainer.innerHTML = '';
            
            fest.name.split('').forEach((char, i) => {
                const slot = document.createElement('div');
                if (char === ' ') {
                    slot.className = "w-6";
                } else {
                    slot.className = "letter-slot w-10 h-14 border-b-4 border-slate-200 flex items-center justify-center text-3xl font-game text-indigo-600";
                    slot.id = `fest-slot-${i}`;
                }
                slotContainer.appendChild(slot);
            });

            generateKeyboard(fest.name);
            updateProgress();
        }

        function generateKeyboard(name) {
            const keyboard = document.getElementById('fest-keyboard');
            keyboard.innerHTML = '';
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
            const required = name.replace(/\s/g, '').split('');
            let pool = [...new Set(required)];
            
            while(pool.length < 15) {
                const rand = letters[Math.floor(Math.random() * 26)];
                if(!pool.includes(rand)) pool.push(rand);
            }
            pool.sort(() => Math.random() - 0.5);

            pool.forEach(l => {
                const btn = document.createElement('button');
                btn.className = "w-11 h-14 bg-white border-2 border-slate-100 rounded-xl font-game text-indigo-500 hover:bg-indigo-50 hover:border-indigo-200 shadow-sm active:scale-90 transition";
                btn.innerText = l;
                btn.onclick = () => handleFestLetter(l, btn);
                keyboard.appendChild(btn);
            });
        }

        function handleFestLetter(letter, btn) {
            const name = festivalData[currentFestIdx].name;
            
            while(name[festSpellingIndex] === ' ') {
                festSpellingIndex++;
            }

            if (letter === name[festSpellingIndex]) {
                const slot = document.getElementById(`fest-slot-${festSpellingIndex}`);
                slot.innerText = letter;
                slot.classList.replace('border-slate-200', 'border-emerald-400');
                slot.classList.add('text-emerald-500');
                festSpellingIndex++;
                
                if (festSpellingIndex >= name.length) {
                    showToast("Excellent! ✨", "bg-indigo-600");
                    setTimeout(loadActivityBlanks, 800);
                }
            } else {
                btn.classList.add('shake', 'bg-red-50', 'border-red-200', 'text-red-500');
                setTimeout(() => btn.classList.remove('shake', 'bg-red-50', 'border-red-200', 'text-red-500'), 500);
            }
        }

        function loadActivityBlanks() {
            document.getElementById('phase-spell-festival').classList.add('hidden');
            document.getElementById('phase-activity-blanks').classList.remove('hidden');
            document.getElementById('btn-next-festival').classList.add('hidden');
            
            const fest = festivalData[currentFestIdx];
            document.getElementById('match-title').innerText = `Traditions of ${fest.name}`;
            
            const container = document.getElementById('activity-container');
            container.innerHTML = '';

            fest.activities.forEach((activity) => {
                const row = document.createElement('div');
                row.className = "bg-white p-6 rounded-2xl border-2 border-slate-50 shadow-sm flex flex-wrap gap-2 justify-center items-center";
                
                const words = activity.split(' ');
                let charCount = 0;

                words.forEach((word) => {
                    const wordWrap = document.createElement('div');
                    wordWrap.className = "flex gap-1 mr-4";

                    word.split('').forEach((char, cIdx) => {
                        // Create a pattern for blanks (hiding roughly 40% of letters)
                        const isBlank = (cIdx + charCount) % 3 === 1;
                        
                        if (isBlank) {
                            const input = document.createElement('input');
                            input.className = "blank-input";
                            input.maxLength = 1;
                            input.dataset.answer = char;
                            input.oninput = (e) => checkBlank(e.target);
                            input.onclick = (e) => e.target.select();
                            wordWrap.appendChild(input);
                        } else {
                            const letter = document.createElement('div');
                            letter.className = "w-8 h-12 flex items-center justify-center text-xl font-bold text-slate-400 border-b-3 border-transparent";
                            letter.innerText = char;
                            wordWrap.appendChild(letter);
                        }
                    });
                    row.appendChild(wordWrap);
                    charCount += word.length;
                });

                container.appendChild(row);
            });
            
            // Focus first blank
            setTimeout(() => {
                const firstInput = document.querySelector('.blank-input');
                if (firstInput) firstInput.focus();
            }, 500);
        }

        function checkBlank(input) {
            const val = input.value.toUpperCase();
            if (val === input.dataset.answer) {
                input.classList.add('correct');
                input.disabled = true;
                
                const allInputs = document.querySelectorAll('.blank-input');
                const allCorrect = Array.from(allInputs).every(i => i.classList.contains('correct'));
                
                if (allCorrect) {
                    document.getElementById('btn-next-festival').classList.remove('hidden');
                    showToast("Wonderful! 🌟", "bg-emerald-500");
                } else {
                    // Find next input
                    const inputsArray = Array.from(allInputs);
                    const currIdx = inputsArray.indexOf(input);
                    const next = inputsArray.slice(currIdx + 1).find(i => !i.disabled);
                    if (next) next.focus();
                }
            } else if (val !== "") {
                input.value = "";
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 400);
            }
        }

        function finishActivityPhase() {
            currentFestIdx++;
            if (currentFestIdx < festivalData.length) {
                loadFestivalSpelling();
            } else {
                document.getElementById('screen-game').classList.add('hidden');
                document.getElementById('screen-end').classList.remove('hidden');
                updateProgress(100);
            }
        }

        function updateProgress(force) {
            const bar = document.getElementById('progress');
            const p = force || (currentFestIdx / festivalData.length) * 100;
            bar.style.width = p + '%';
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 px-10 py-4 rounded-full text-white font-bold shadow-2xl z-50 transition-all ${color}`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2000);
        }
    </script>
</body>
</html>
